name: Container Build and Push

on:
  workflow_call:
    inputs:
      registry:
        description: "What container registry to push to"
        required: false
        type: string
        default: ghcr.io
      image:
        description: "Name of container image"
        required: false
        type: string
        default: ${{ github.repository }}
      context:
        description: "Path to build context"
        required: false
        type: string
        default: .
      file:
        description: "Name of the file to build"
        required: false
        type: string
        default: Dockerfile
      runners:
        description: "Runners to use"
        required: false
        type: string
        default: "['ubuntu-latest']"
      tags:
        description: "Tags to build"
        required: false
        type: string
        default: |
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}
    outputs:
      image_digest:
        description: "Image digest"
        value: ${{ jobs.container-image-release.outputs.output_digest }}

jobs:
  container-image-release:
    name: Make container image release
    runs-on: ${{ fromJson(inputs.runners) }}
    timeout-minutes: 15
    outputs:
      output_digest: ${{ steps.build_and_push.outputs.digest }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create the image tags
        id: image-tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image }}
          tags: ${{ inputs.tags }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build_and_push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: true
          provenance: false
          labels: ${{ steps.image-tag.outputs.labels }}
          tags: "${{ steps.image-tag.outputs.tags }}"
